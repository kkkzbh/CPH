<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>CPH Target Runner</title>
<style>
  :root {
    color-scheme: light;
  }
  html, body {
    margin: 0;
    background: #ffffff;
  }
  body {
    width: 280px;
    padding: 18px 20px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    font-size: 13.5px;
    color: #1a1a1f;
    -webkit-font-smoothing: antialiased;
  }
  h1 {
    margin: 0 0 14px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.1px;
  }
  ol {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  ol li {
    display: flex;
    gap: 10px;
    align-items: baseline;
    padding: 10px 0;
    line-height: 1.55;
  }
  ol li + li {
    border-top: 1px solid #f0f0f3;
  }
  ol li sup {
    flex: none;
    width: 14px;
    color: #98989f;
    font-size: 11px;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    top: -0.2em;
  }
  ol li code {
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    font-size: 12px;
    color: #6a6a72;
  }
  ol li small {
    display: block;
    margin-top: 2px;
    color: #98989f;
    font-size: 11.5px;
    line-height: 1.5;
  }
  footer {
    margin-top: 14px;
    text-align: center;
    color: #98989f;
    font-size: 11px;
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>
<h1>CPH Target Runner</h1>
<ol>
  <li><sup>1</sup><span>浏览器打开 CF 题目页（如 <code>/contest/X/problem/Y</code>）</span></li>
  <li><sup>2</sup><span>在 IDE 中选中要提交的 Target<small>纯单文件模式下，确保当前正处于该 <code>.cpp</code> 文件中</small></span></li>
  <li><sup>3</sup><span>点击 CPH 工具窗的 📤 按钮</span></li>
</ol>
<footer>v1.0.0</footer>
</body>
</html>
