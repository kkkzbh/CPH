name: Verify and Publish Plugin

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_target:
        description: Marketplace channel to publish when force_publish is enabled
        required: false
        default: eap
        type: choice
        options:
          - eap
          - stable
      force_publish:
        description: Force publish the current ref to the selected Marketplace channel
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.version.outputs.version_changed }}
      old_version: ${{ steps.version.outputs.old_version }}
      new_version: ${{ steps.version.outputs.new_version }}
      browser_extension_version: ${{ steps.version.outputs.browser_extension_version }}
      should_publish: ${{ steps.target.outputs.should_publish }}
      publish_target: ${{ steps.target.outputs.publish_target }}
      marketplace_channels: ${{ steps.target.outputs.marketplace_channels }}
      prerelease: ${{ steps.target.outputs.prerelease }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Detect plugin version change
        id: version
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          extract_property() {
            local property_name="$1"
            local property_file="$2"
            awk -F'=' -v name="${property_name}" '$1 ~ "^[[:space:]]*" name "[[:space:]]*$" {gsub(/^[[:space:]]+|[[:space:]]+$/, "", $2); print $2; exit}' "${property_file}"
          }

          new_version="$(extract_property pluginVersion gradle.properties)"
          browser_extension_version="$(extract_property browserExtensionVersion gradle.properties)"
          old_version=""
          version_changed="false"

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]] && [[ "${GITHUB_REF_TYPE}" == "branch" ]] && [[ -n "${BEFORE_SHA:-}" ]] && [[ "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]]; then
            tmp_file="$(mktemp)"
            if git show "${BEFORE_SHA}:gradle.properties" > "${tmp_file}" 2>/dev/null; then
              old_version="$(extract_property pluginVersion "${tmp_file}")"
              if [[ -n "${old_version}" ]] && [[ "${old_version}" != "${new_version}" ]]; then
                version_changed="true"
              fi
            fi
            rm -f "${tmp_file}"
          fi

          echo "old_version=${old_version}" >> "${GITHUB_OUTPUT}"
          echo "new_version=${new_version}" >> "${GITHUB_OUTPUT}"
          echo "browser_extension_version=${browser_extension_version}" >> "${GITHUB_OUTPUT}"
          echo "version_changed=${version_changed}" >> "${GITHUB_OUTPUT}"

          echo "Old version: ${old_version:-<none>}"
          echo "New version: ${new_version}"
          echo "Browser extension version: ${browser_extension_version}"
          echo "Version changed: ${version_changed}"

      - name: Resolve Marketplace publish target
        id: target
        shell: bash
        env:
          FORCE_PUBLISH: ${{ github.event.inputs.force_publish }}
          INPUT_TARGET: ${{ github.event.inputs.publish_target }}
          NEW_VERSION: ${{ steps.version.outputs.new_version }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          VERSION_CHANGED: ${{ steps.version.outputs.version_changed }}
        run: |
          set -euo pipefail

          should_publish="false"
          publish_target="none"
          marketplace_channels=""
          prerelease="false"

          is_eap_version() {
            [[ "$1" =~ -eap\.[0-9]+$ ]]
          }

          is_prerelease_version() {
            [[ "$1" =~ -(eap|alpha|beta|rc)(\.|$) ]]
          }

          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${REF_TYPE}" == "branch" && "${REF_NAME}" == "main" ]]; then
            if [[ "${VERSION_CHANGED}" == "true" ]]; then
              if is_eap_version "${NEW_VERSION}"; then
                should_publish="true"
                publish_target="eap"
                marketplace_channels="eap"
                prerelease="true"
              elif is_prerelease_version "${NEW_VERSION}"; then
                echo "::error::Only versions ending in -eap.N can be auto-published to Marketplace EAP from main. Current pluginVersion: ${NEW_VERSION}"
                exit 1
              else
                echo "pluginVersion changed to stable version ${NEW_VERSION}; main push will verify only. Create tag v${NEW_VERSION} to publish stable."
              fi
            fi
          elif [[ "${GITHUB_EVENT_NAME}" == "push" && "${REF_TYPE}" == "tag" ]]; then
            expected_tag="v${NEW_VERSION}"
            if [[ "${REF_NAME}" != "${expected_tag}" ]]; then
              echo "::error::Stable tag ${REF_NAME} does not match pluginVersion ${NEW_VERSION}. Expected ${expected_tag}."
              exit 1
            fi
            if is_prerelease_version "${NEW_VERSION}"; then
              echo "::error::Stable tag publishing requires a stable pluginVersion, got ${NEW_VERSION}."
              exit 1
            fi
            should_publish="true"
            publish_target="stable"
          elif [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${FORCE_PUBLISH:-false}" == "true" ]]; then
            case "${INPUT_TARGET:-eap}" in
              eap)
                if ! is_eap_version "${NEW_VERSION}"; then
                  echo "::error::Manual EAP publishing requires pluginVersion ending in -eap.N, got ${NEW_VERSION}."
                  exit 1
                fi
                should_publish="true"
                publish_target="eap"
                marketplace_channels="eap"
                prerelease="true"
                ;;
              stable)
                expected_tag="v${NEW_VERSION}"
                if [[ "${REF_TYPE}" != "tag" || "${REF_NAME}" != "${expected_tag}" ]]; then
                  echo "::error::Manual stable publishing must run on tag ${expected_tag}; current ref is ${REF_TYPE}:${REF_NAME}."
                  exit 1
                fi
                if is_prerelease_version "${NEW_VERSION}"; then
                  echo "::error::Stable publishing requires a stable pluginVersion, got ${NEW_VERSION}."
                  exit 1
                fi
                should_publish="true"
                publish_target="stable"
                ;;
              *)
                echo "::error::Unknown publish_target: ${INPUT_TARGET}"
                exit 1
                ;;
            esac
          fi

          echo "should_publish=${should_publish}" >> "${GITHUB_OUTPUT}"
          echo "publish_target=${publish_target}" >> "${GITHUB_OUTPUT}"
          echo "marketplace_channels=${marketplace_channels}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

          echo "Should publish: ${should_publish}"
          echo "Publish target: ${publish_target}"
          echo "Marketplace channels: ${marketplace_channels:-<default>}"
          echo "GitHub prerelease: ${prerelease}"

      - name: Require plugin metadata update on release pushes
        if: github.event_name == 'push' && github.ref_type == 'branch' && steps.version.outputs.version_changed == 'true'
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          if ! git diff --name-only "${BEFORE_SHA}" "${GITHUB_SHA}" | grep -Fxq "src/main/resources/META-INF/plugin.xml"; then
            echo "::error::pluginVersion changed, but src/main/resources/META-INF/plugin.xml was not updated."
            exit 1
          fi

          python3 - <<'PY'
          import os
          import re
          import subprocess
          import sys

          before = os.environ["BEFORE_SHA"]
          path = "src/main/resources/META-INF/plugin.xml"

          def read_at(ref: str) -> str:
              return subprocess.check_output(["git", "show", f"{ref}:{path}"], text=True)

          def change_notes(text: str) -> str:
              match = re.search(r"<change-notes><!\[CDATA\[(.*?)\]\]></change-notes>", text, re.S)
              if not match:
                  print(f"::error::{path} has no <change-notes> CDATA block.")
                  sys.exit(1)
              return "\n".join(line.strip() for line in match.group(1).strip().splitlines() if line.strip())

          old_notes = change_notes(read_at(before))
          new_notes = change_notes(open(path, encoding="utf-8").read())
          if old_notes == new_notes:
              print("::error::pluginVersion changed, but <change-notes> was not updated. Write real What's New notes for this release.")
              sys.exit(1)
          PY

      - name: Run tests and build plugin
        run: ./gradlew --stacktrace test buildPlugin packageBrowserExtension packageAveMujicaTheme

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ steps.version.outputs.new_version }}
          path: |
            build/distributions/clion-cph-target-runner-${{ steps.version.outputs.new_version }}.zip
            build/distributions/cph-target-runner-browser-${{ steps.version.outputs.browser_extension_version }}.zip
            build/distributions/cph-theme-avemujica-${{ steps.version.outputs.new_version }}.zip
            build/distributions/cph-theme-avemujica.json
          if-no-files-found: error

  release:
    needs: verify
    if: needs.verify.result == 'success' && needs.verify.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: v${{ needs.verify.outputs.new_version }}
      PLUGIN_VERSION: ${{ needs.verify.outputs.new_version }}
      BROWSER_EXTENSION_VERSION: ${{ needs.verify.outputs.browser_extension_version }}
      PRERELEASE: ${{ needs.verify.outputs.prerelease }}
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets-${{ needs.verify.outputs.new_version }}
          path: release-assets

      - name: Create GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          plugin_asset="release-assets/clion-cph-target-runner-${PLUGIN_VERSION}.zip"
          browser_asset="release-assets/cph-target-runner-browser-${BROWSER_EXTENSION_VERSION}.zip"
          theme_asset="release-assets/cph-theme-avemujica-${PLUGIN_VERSION}.zip"
          theme_manifest="release-assets/cph-theme-avemujica.json"

          if [[ ! -f "${plugin_asset}" ]]; then
            echo "::error::Missing plugin release asset: ${plugin_asset}"
            exit 1
          fi

          if [[ ! -f "${browser_asset}" ]]; then
            echo "::error::Missing browser extension release asset: ${browser_asset}"
            exit 1
          fi

          if [[ ! -f "${theme_asset}" ]]; then
            echo "::error::Missing Ave Mujica theme release asset: ${theme_asset}"
            exit 1
          fi

          if [[ ! -f "${theme_manifest}" ]]; then
            echo "::error::Missing Ave Mujica theme manifest: ${theme_manifest}"
            exit 1
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "::error::GitHub Release ${RELEASE_TAG} already exists. Bump pluginVersion before publishing a new release."
            exit 1
          fi

          release_args=(
            "${RELEASE_TAG}"
            "${plugin_asset}"
            "${browser_asset}"
            "${theme_asset}"
            "${theme_manifest}"
            --target "${GITHUB_SHA}"
            --title "CPH Target Runner ${PLUGIN_VERSION}"
            --notes "Automated release for CPH Target Runner ${PLUGIN_VERSION}."
          )

          if [[ "${PRERELEASE}" == "true" ]]; then
            release_args+=(--prerelease)
          fi

          gh release create "${release_args[@]}"

  publish:
    needs: verify
    if: needs.verify.result == 'success' && needs.verify.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    env:
      MARKETPLACE_CHANNELS: ${{ needs.verify.outputs.marketplace_channels }}
      PUBLISH_TARGET: ${{ needs.verify.outputs.publish_target }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Marketplace token is configured
        shell: bash
        env:
          JB_MARKETPLACE_TOKEN: ${{ secrets.JB_MARKETPLACE_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${JB_MARKETPLACE_TOKEN:-}" ]]; then
            echo "::error::Missing GitHub secret JB_MARKETPLACE_TOKEN."
            exit 1
          fi

      - name: Publish plugin to Marketplace
        env:
          JB_MARKETPLACE_TOKEN: ${{ secrets.JB_MARKETPLACE_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -n "${MARKETPLACE_CHANNELS}" ]]; then
            ./gradlew --stacktrace publishPlugin -PmarketplaceChannels="${MARKETPLACE_CHANNELS}"
          else
            ./gradlew --stacktrace publishPlugin
          fi
