name: Verify and Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      plugin_target:
        description: Which JetBrains plugin channel to publish after verification
        required: true
        default: verify_only
        type: choice
        options:
          - verify_only
          - stable
          - eap
          - both
      browser_target:
        description: Whether to publish the browser extension release
        required: true
        default: none
        type: choice
        options:
          - none
          - release

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      stable_plugin_version: ${{ steps.versions.outputs.stable_plugin_version }}
      eap_plugin_version: ${{ steps.versions.outputs.eap_plugin_version }}
      browser_extension_version: ${{ steps.versions.outputs.browser_extension_version }}
      theme_version: ${{ steps.versions.outputs.theme_version }}
      plugin_target: ${{ steps.target.outputs.plugin_target }}
      browser_target: ${{ steps.target.outputs.browser_target }}
      publish_stable: ${{ steps.target.outputs.publish_stable }}
      publish_eap: ${{ steps.target.outputs.publish_eap }}
      publish_browser: ${{ steps.target.outputs.publish_browser }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Detect release versions
        id: versions
        shell: bash
        run: |
          set -euo pipefail

          extract_property() {
            local property_name="$1"
            local property_file="$2"
            awk -F'=' -v name="${property_name}" '$1 ~ "^[[:space:]]*" name "[[:space:]]*$" {gsub(/^[[:space:]]+|[[:space:]]+$/, "", $2); print $2; exit}' "${property_file}"
          }

          stable_plugin_version="$(extract_property stablePluginVersion gradle.properties)"
          eap_plugin_version="$(extract_property eapPluginVersion gradle.properties)"
          browser_extension_version="$(extract_property browserExtensionVersion gradle.properties)"
          theme_version="$(extract_property aveMujicaThemeVersion gradle.properties)"
          theme_min_plugin_version="$(extract_property aveMujicaThemeMinPluginVersion gradle.properties)"

          if [[ -z "${stable_plugin_version}" ]]; then
            echo "::error::Missing stablePluginVersion in gradle.properties."
            exit 1
          fi
          if [[ -z "${eap_plugin_version}" ]]; then
            echo "::error::Missing eapPluginVersion in gradle.properties."
            exit 1
          fi
          if [[ -z "${browser_extension_version}" ]]; then
            echo "::error::Missing browserExtensionVersion in gradle.properties."
            exit 1
          fi
          if [[ -z "${theme_version}" ]]; then
            echo "::error::Missing aveMujicaThemeVersion in gradle.properties."
            exit 1
          fi
          if [[ -z "${theme_min_plugin_version}" ]]; then
            echo "::error::Missing aveMujicaThemeMinPluginVersion in gradle.properties."
            exit 1
          fi

          if [[ "${stable_plugin_version}" =~ -(eap|alpha|beta|rc)(\.|$) ]]; then
            echo "::error::stablePluginVersion must be a stable version, got ${stable_plugin_version}."
            exit 1
          fi
          if [[ ! "${eap_plugin_version}" =~ -eap\.[0-9]+$ ]]; then
            echo "::error::eapPluginVersion must end with -eap.N, got ${eap_plugin_version}."
            exit 1
          fi
          if [[ "${stable_plugin_version}" == "${eap_plugin_version}" ]]; then
            echo "::error::stablePluginVersion and eapPluginVersion must be different."
            exit 1
          fi

          echo "stable_plugin_version=${stable_plugin_version}" >> "${GITHUB_OUTPUT}"
          echo "eap_plugin_version=${eap_plugin_version}" >> "${GITHUB_OUTPUT}"
          echo "browser_extension_version=${browser_extension_version}" >> "${GITHUB_OUTPUT}"
          echo "theme_version=${theme_version}" >> "${GITHUB_OUTPUT}"

          echo "Stable plugin version: ${stable_plugin_version}"
          echo "EAP plugin version: ${eap_plugin_version}"
          echo "Browser extension version: ${browser_extension_version}"
          echo "Ave Mujica theme version: ${theme_version}"
          echo "Ave Mujica theme minimum plugin version: ${theme_min_plugin_version}"

      - name: Resolve publish targets
        id: target
        shell: bash
        env:
          INPUT_PLUGIN_TARGET: ${{ github.event.inputs.plugin_target }}
          INPUT_BROWSER_TARGET: ${{ github.event.inputs.browser_target }}
        run: |
          set -euo pipefail

          plugin_target="verify_only"
          browser_target="none"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            plugin_target="${INPUT_PLUGIN_TARGET:-verify_only}"
            browser_target="${INPUT_BROWSER_TARGET:-none}"
          fi

          publish_stable="false"
          publish_eap="false"
          publish_browser="false"
          case "${plugin_target}" in
            verify_only)
              ;;
            stable)
              publish_stable="true"
              ;;
            eap)
              publish_eap="true"
              ;;
            both)
              publish_stable="true"
              publish_eap="true"
              ;;
            *)
              echo "::error::Unknown plugin_target: ${plugin_target}"
              exit 1
              ;;
          esac

          case "${browser_target}" in
            none)
              ;;
            release)
              publish_browser="true"
              ;;
            *)
              echo "::error::Unknown browser_target: ${browser_target}"
              exit 1
              ;;
          esac

          echo "plugin_target=${plugin_target}" >> "${GITHUB_OUTPUT}"
          echo "browser_target=${browser_target}" >> "${GITHUB_OUTPUT}"
          echo "publish_stable=${publish_stable}" >> "${GITHUB_OUTPUT}"
          echo "publish_eap=${publish_eap}" >> "${GITHUB_OUTPUT}"
          echo "publish_browser=${publish_browser}" >> "${GITHUB_OUTPUT}"

          echo "Plugin target: ${plugin_target}"
          echo "Browser target: ${browser_target}"
          echo "Publish stable: ${publish_stable}"
          echo "Publish EAP: ${publish_eap}"
          echo "Publish browser extension: ${publish_browser}"

      - name: Run tests and build requested assets
        shell: bash
        env:
          PLUGIN_TARGET: ${{ steps.target.outputs.plugin_target }}
          BROWSER_TARGET: ${{ steps.target.outputs.browser_target }}
          PUBLISH_STABLE: ${{ steps.target.outputs.publish_stable }}
          PUBLISH_EAP: ${{ steps.target.outputs.publish_eap }}
          PUBLISH_BROWSER: ${{ steps.target.outputs.publish_browser }}
        run: |
          set -euo pipefail

          full_verify="false"
          if [[ "${GITHUB_EVENT_NAME}" == "push" || ("${PLUGIN_TARGET}" == "verify_only" && "${BROWSER_TARGET}" == "none") ]]; then
            full_verify="true"
          fi

          if [[ "${full_verify}" == "true" || "${PUBLISH_BROWSER}" == "true" ]]; then
            node browser-extension/cph-target-runner/submit-core.test.js
            node --check browser-extension/cph-target-runner/background.js
            node --check browser-extension/cph-target-runner/page-submit.js
            node --check browser-extension/cph-target-runner/submit-core.js
            node --check browser-extension/cph-target-runner/extension-core.js
          fi

          if [[ "${full_verify}" == "true" || ("${PUBLISH_STABLE}" == "true" && "${PUBLISH_EAP}" == "true" && "${PUBLISH_BROWSER}" == "true") ]]; then
            ./gradlew --stacktrace buildReleaseVariants
            exit 0
          fi

          if [[ "${PUBLISH_STABLE}" == "true" ]]; then
            ./gradlew --stacktrace test buildPlugin -PcphVariant=stable
          fi

          if [[ "${PUBLISH_EAP}" == "true" ]]; then
            ./gradlew --stacktrace test buildPlugin packageAveMujicaTheme -PcphVariant=eap
          fi

          if [[ "${PUBLISH_BROWSER}" == "true" ]]; then
            ./gradlew --stacktrace test packageBrowserExtension
          fi

      - name: Collect release assets
        shell: bash
        env:
          PLUGIN_TARGET: ${{ steps.target.outputs.plugin_target }}
          BROWSER_TARGET: ${{ steps.target.outputs.browser_target }}
          PUBLISH_STABLE: ${{ steps.target.outputs.publish_stable }}
          PUBLISH_EAP: ${{ steps.target.outputs.publish_eap }}
          PUBLISH_BROWSER: ${{ steps.target.outputs.publish_browser }}
          STABLE_PLUGIN_VERSION: ${{ steps.versions.outputs.stable_plugin_version }}
          EAP_PLUGIN_VERSION: ${{ steps.versions.outputs.eap_plugin_version }}
          BROWSER_EXTENSION_VERSION: ${{ steps.versions.outputs.browser_extension_version }}
          THEME_VERSION: ${{ steps.versions.outputs.theme_version }}
        run: |
          set -euo pipefail

          full_verify="false"
          if [[ "${GITHUB_EVENT_NAME}" == "push" || ("${PLUGIN_TARGET}" == "verify_only" && "${BROWSER_TARGET}" == "none") ]]; then
            full_verify="true"
          fi

          mkdir -p release-assets

          copy_asset() {
            local path="$1"
            if [[ ! -f "${path}" ]]; then
              echo "::error::Missing release asset: ${path}"
              exit 1
            fi
            cp "${path}" release-assets/
          }

          if [[ "${full_verify}" == "true" || "${PUBLISH_STABLE}" == "true" ]]; then
            copy_asset "build/distributions/clion-cph-target-runner-${STABLE_PLUGIN_VERSION}.zip"
          fi

          if [[ "${full_verify}" == "true" || "${PUBLISH_EAP}" == "true" ]]; then
            copy_asset "build/distributions/clion-cph-target-runner-${EAP_PLUGIN_VERSION}.zip"
            copy_asset "build/distributions/cph-theme-avemujica-${THEME_VERSION}.zip"
            copy_asset "build/distributions/cph-theme-avemujica.json"
          fi

          if [[ "${full_verify}" == "true" || "${PUBLISH_BROWSER}" == "true" ]]; then
            copy_asset "build/distributions/cph-target-runner-browser-${BROWSER_EXTENSION_VERSION}.zip"
          fi

          ls -la release-assets

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: release-assets/*
          if-no-files-found: error

  release_stable:
    needs: verify
    if: needs.verify.result == 'success' && needs.verify.outputs.publish_stable == 'true'
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: v${{ needs.verify.outputs.stable_plugin_version }}
      STABLE_PLUGIN_VERSION: ${{ needs.verify.outputs.stable_plugin_version }}
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets

      - name: Create stable GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          plugin_asset="release-assets/clion-cph-target-runner-${STABLE_PLUGIN_VERSION}.zip"

          if [[ ! -f "${plugin_asset}" ]]; then
            echo "::error::Missing stable plugin release asset: ${plugin_asset}"
            exit 1
          fi
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "::error::GitHub Release ${RELEASE_TAG} already exists. Bump stablePluginVersion before publishing."
            exit 1
          fi

          gh release create "${RELEASE_TAG}" \
            "${plugin_asset}" \
            --target "${GITHUB_SHA}" \
            --title "CPH Target Runner ${STABLE_PLUGIN_VERSION}" \
            --notes "Stable JetBrains plugin release for CPH Target Runner ${STABLE_PLUGIN_VERSION}."

  release_eap:
    needs: verify
    if: needs.verify.result == 'success' && needs.verify.outputs.publish_eap == 'true'
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: v${{ needs.verify.outputs.eap_plugin_version }}
      EAP_PLUGIN_VERSION: ${{ needs.verify.outputs.eap_plugin_version }}
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets

      - name: Create EAP GitHub prerelease
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          plugin_asset="release-assets/clion-cph-target-runner-${EAP_PLUGIN_VERSION}.zip"

          if [[ ! -f "${plugin_asset}" ]]; then
            echo "::error::Missing EAP plugin release asset: ${plugin_asset}"
            exit 1
          fi
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "::error::GitHub Release ${RELEASE_TAG} already exists. Bump eapPluginVersion before publishing."
            exit 1
          fi

          gh release create "${RELEASE_TAG}" \
            "${plugin_asset}" \
            --target "${GITHUB_SHA}" \
            --title "CPH Target Runner ${EAP_PLUGIN_VERSION}" \
            --notes "EAP JetBrains plugin prerelease for CPH Target Runner ${EAP_PLUGIN_VERSION}." \
            --prerelease

  release_browser:
    needs: verify
    if: needs.verify.result == 'success' && needs.verify.outputs.publish_browser == 'true'
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: browser-v${{ needs.verify.outputs.browser_extension_version }}
      BROWSER_EXTENSION_VERSION: ${{ needs.verify.outputs.browser_extension_version }}
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets

      - name: Create browser extension GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          browser_asset="release-assets/cph-target-runner-browser-${BROWSER_EXTENSION_VERSION}.zip"

          if [[ ! -f "${browser_asset}" ]]; then
            echo "::error::Missing browser extension release asset: ${browser_asset}"
            exit 1
          fi
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "::error::GitHub Release ${RELEASE_TAG} already exists. Bump browserExtensionVersion before publishing."
            exit 1
          fi

          gh release create "${RELEASE_TAG}" \
            "${browser_asset}" \
            --target "${GITHUB_SHA}" \
            --title "CPH Target Runner Browser Extension ${BROWSER_EXTENSION_VERSION}" \
            --notes "Browser extension release for CPH Target Runner ${BROWSER_EXTENSION_VERSION}." \
            --latest=false

  release_theme:
    needs: verify
    if: needs.verify.result == 'success' && needs.verify.outputs.publish_eap == 'true'
    runs-on: ubuntu-latest
    env:
      THEME_RELEASE_TAG: theme-avemujica
      THEME_VERSION: ${{ needs.verify.outputs.theme_version }}
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets

      - name: Publish Ave Mujica theme assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          theme_asset="release-assets/cph-theme-avemujica-${THEME_VERSION}.zip"
          theme_manifest="release-assets/cph-theme-avemujica.json"

          if [[ ! -f "${theme_asset}" ]]; then
            echo "::error::Missing Ave Mujica theme asset: ${theme_asset}"
            exit 1
          fi
          if [[ ! -f "${theme_manifest}" ]]; then
            echo "::error::Missing Ave Mujica theme manifest: ${theme_manifest}"
            exit 1
          fi

          if ! gh release view "${THEME_RELEASE_TAG}" >/dev/null 2>&1; then
            gh release create "${THEME_RELEASE_TAG}" \
              --target "${GITHUB_SHA}" \
              --title "Ave Mujica Theme" \
              --notes "Standalone release channel for Ave Mujica theme assets."
          fi

          theme_asset_name="$(basename "${theme_asset}")"
          if gh release view "${THEME_RELEASE_TAG}" --json assets --jq '.assets[].name' | grep -Fxq "${theme_asset_name}"; then
            echo "Ave Mujica theme ${THEME_VERSION} is already published; leaving standalone theme release unchanged."
            exit 0
          fi

          gh release upload "${THEME_RELEASE_TAG}" "${theme_asset}"
          gh release upload "${THEME_RELEASE_TAG}" "${theme_manifest}" --clobber

  publish_stable:
    needs: verify
    if: needs.verify.result == 'success' && needs.verify.outputs.publish_stable == 'true'
    runs-on: ubuntu-latest
    env:
      STABLE_PLUGIN_VERSION: ${{ needs.verify.outputs.stable_plugin_version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Marketplace token is configured
        shell: bash
        env:
          JB_MARKETPLACE_TOKEN: ${{ secrets.JB_MARKETPLACE_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${JB_MARKETPLACE_TOKEN:-}" ]]; then
            echo "::error::Missing GitHub secret JB_MARKETPLACE_TOKEN."
            exit 1
          fi

      - name: Publish stable plugin to Marketplace
        env:
          JB_MARKETPLACE_TOKEN: ${{ secrets.JB_MARKETPLACE_TOKEN }}
        run: ./gradlew --stacktrace --info publishPlugin -PcphVariant=stable

      - name: Verify stable Marketplace visibility
        run: |
          set -euo pipefail
          url="https://plugins.jetbrains.com/api/plugins/31535/updates?version=${STABLE_PLUGIN_VERSION}"
          jq_filter='.[] | select(.version == env.STABLE_PLUGIN_VERSION and (.channel == "" or .channel == null))'
          for attempt in {1..12}; do
            response="$(curl --fail --silent --show-error --location "${url}")"
            if STABLE_PLUGIN_VERSION="${STABLE_PLUGIN_VERSION}" jq -e "${jq_filter}" >/dev/null <<<"${response}"; then
              echo "Marketplace default channel exposes CPH ${STABLE_PLUGIN_VERSION}."
              exit 0
            fi
            echo "Marketplace default channel does not expose CPH ${STABLE_PLUGIN_VERSION} yet; retry ${attempt}/12."
            sleep 10
          done
          echo "::error::Marketplace default channel does not expose CPH ${STABLE_PLUGIN_VERSION} after publishing."
          exit 1

  publish_eap:
    needs: verify
    if: needs.verify.result == 'success' && needs.verify.outputs.publish_eap == 'true'
    runs-on: ubuntu-latest
    env:
      EAP_PLUGIN_VERSION: ${{ needs.verify.outputs.eap_plugin_version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Marketplace token is configured
        shell: bash
        env:
          JB_MARKETPLACE_TOKEN: ${{ secrets.JB_MARKETPLACE_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${JB_MARKETPLACE_TOKEN:-}" ]]; then
            echo "::error::Missing GitHub secret JB_MARKETPLACE_TOKEN."
            exit 1
          fi

      - name: Publish EAP plugin to Marketplace
        env:
          JB_MARKETPLACE_TOKEN: ${{ secrets.JB_MARKETPLACE_TOKEN }}
        run: ./gradlew --stacktrace --info publishPlugin -PcphVariant=eap -PmarketplaceChannels=eap

      - name: Verify EAP Marketplace visibility
        run: |
          set -euo pipefail
          url="https://plugins.jetbrains.com/api/plugins/31535/updates?channel=eap"
          jq_filter='.[] | select(.version == env.EAP_PLUGIN_VERSION and .channel == "eap")'
          for attempt in {1..12}; do
            response="$(curl --fail --silent --show-error --location "${url}")"
            if EAP_PLUGIN_VERSION="${EAP_PLUGIN_VERSION}" jq -e "${jq_filter}" >/dev/null <<<"${response}"; then
              echo "Marketplace eap channel exposes CPH ${EAP_PLUGIN_VERSION}."
              exit 0
            fi
            echo "Marketplace eap channel does not expose CPH ${EAP_PLUGIN_VERSION} yet; retry ${attempt}/12."
            sleep 10
          done
          echo "::error::Marketplace eap channel does not expose CPH ${EAP_PLUGIN_VERSION} after publishing."
          exit 1
